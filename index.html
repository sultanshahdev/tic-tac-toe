<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>
<body>
    <head>
        <div class="scoreboard">
            <div class="player-details">
                <p class="player-name">
                    Player 1
                </p>
                <img class='player-profile-icon' id='p1-img' src="assets/dog-profile.png" alt="" class="player-icon">
                <p class="player-score">
                    Score : 0
                </p>
            </div>
            <div class="player-details">
                <p class="player-name">
                    Player 2
                </p>
                
                <img class='player-profile-icon' id='p2-img' src="assets/penguin-profile.png" alt="" class="player-icon">
                <p class="player-score">
                    Score : 0
                </p>
            </div>
        </div>
    </head>
    <main>  
        <div class="game-board-background">
            <div class="game-board">
                <div class="tile" id="tile-1"><img class="cross-img" src="assets/cross.png"  height="60px" ></div>
                <div class="tile" id="tile-2"><img class="circle-img"   src="assets/circle.png"   height="60px"alt=""></div>
                <div class="tile" id="tile-3"><img src="" alt=""></div>
                <div class="tile" id="tile-4"><img src="" alt=""></div>
                <div class="tile" id="tile-5"><img src="" alt=""></div>
                <div class="tile" id="tile-6"><img src="" alt=""></div>
                <div class="tile" id="tile-7"><img src="" alt=""></div>
                <div class="tile" id="tile-8"><img src="" alt=""></div>
                <div class="tile" id="tile-9"><img src="" alt=""></div>
            </div>
        </div>
        
    </main>
    <footer>
        <div class="abort-game-option">
            <button class="abort-game-btn">
                <p>Abort game</p>
            </button>
        </div>
        <div class="reset-score">
            <button class="reset-score-btn">
                <p>Reset Score</p>
            </button>
        </div>
    </footer>
</body>
</html>
