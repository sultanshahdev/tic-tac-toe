<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>
<body>
    <dialog class="win-msg">

    </dialog>
    <head>
        <div class="scoreboard">
            <div class="player-details">
                <p class="player-name">
                    Player 1
                </p>
                <img class='player-profile-icon' id='p1-img' src="assets/dog-profile.png" alt="" class="player-icon">
                <p class="player-score" id="player1-score">
                    Score : 0
                </p>
            </div>
            <div class="player-details">
                <p class="player-name">
                    Player 2
                </p>
                
                <img class='player-profile-icon' id='p2-img' src="assets/penguin-profile.png" alt="" class="player-icon">
                <p class="player-score" id="player2-score">
                    Score : 0
                </p>
            </div>
        </div>
    </head>
    <main>  
         <dialog class="win-msg">
            Player () won the Match
            <button class="new-round-btn" type="submit">
                Play Again!
            </button>
        </dialog>
        <div class="game-board-background">
            <div class="game-board">
                <div class="tile" id="tile1"><img class="cross-img" src="assets/cross.png"></div>
                <div class="tile" id="tile2"><img class="circle-img"   src="assets/circle.png"></div>
                <div class="tile" id="tile3"><img src="" alt=""></div>
                <div class="tile" id="tile4"><img src="" alt=""></div>
                <div class="tile" id="tile5"><img src="" alt=""></div>
                <div class="tile" id="tile6"><img src="" alt=""></div>
                <div class="tile" id="tile7"><img src="" alt=""></div>
                <div class="tile" id="tile8"><img src="" alt=""></div>
                <div class="tile" id="tile9"><img src="" alt=""></div>
            </div>
        </div>
        
    </main>
    <footer>
        <div class="abort-game-option">
            <button class="abort-game-btn">
                Abort game
            </button>
        </div>
        <div class="reset-score">
            <button class="reset-score-btn">
                Reset Score
            </button>
        </div>
    </footer>
</body>
</html>
